<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e1117;
    --panel: #161b25;
    --panel-2: #1d2430;
    --grid-a: #131925;
    --grid-b: #10151f;
    --snake: #4ade80;
    --snake-head: #86efac;
    --food: #f87171;
    --text: #e6edf3;
    --muted: #8b98a9;
    --accent: #38bdf8;
    --border: #263041;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 50% -10%, #182131 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  header { text-align: center; }

  h1 {
    font-size: clamp(1.9rem, 6vw, 2.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(120deg, var(--snake), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 2px; }

  .scores {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    text-align: center;
  }

  .stat .label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .stat .value {
    font-size: 1.7rem;
    font-weight: 700;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }

  .board-wrap {
    position: relative;
    border-radius: 18px;
    padding: 12px;
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 10px;
    touch-action: none;
    background: var(--grid-b);
  }

  .overlay {
    position: absolute;
    inset: 12px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 24px;
    background: rgba(10, 14, 20, 0.82);
    backdrop-filter: blur(6px);
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }

  .overlay.hidden { opacity: 0; visibility: hidden; }

  .overlay h2 { font-size: 1.6rem; font-weight: 700; }
  .overlay p { color: var(--muted); font-size: 0.92rem; max-width: 260px; line-height: 1.5; }

  .btn {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    color: #06210f;
    background: linear-gradient(120deg, var(--snake), #22c55e);
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease;
    box-shadow: 0 8px 24px rgba(74, 222, 128, 0.28);
  }

  .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
  .btn:active { transform: translateY(0); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: var(--muted);
    font-size: 0.82rem;
  }

  kbd {
    font-family: inherit;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 0.78rem;
    color: var(--text);
  }

  .keys { display: flex; gap: 5px; align-items: center; }

  .pause-btn {
    font-family: inherit;
    font-size: 0.82rem;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .pause-btn:hover { background: #26303f; }

  @media (max-width: 380px) {
    .footer { flex-direction: column; align-items: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    .btn, .overlay { transition: none; }
    .btn:hover { transform: none; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Snake</h1>
      <p class="subtitle">Eat, grow, don't bite yourself.</p>
    </header>

    <div class="scores">
      <div class="stat">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="label">Best</div>
        <div class="value" id="best">0</div>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="board" width="420" height="420" aria-label="Snake game board"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="overlay-title">Ready to play?</h2>
        <p id="overlay-text">Use arrow keys or WASD to steer. On mobile, swipe in any direction.</p>
        <button class="btn" id="start-btn">Start Game</button>
      </div>
    </div>

    <div class="footer">
      <div class="keys">
        <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd>
        <span style="margin-left:4px">or WASD</span>
      </div>
      <button class="pause-btn" id="pause-btn">Pause · Space</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlay-title");
  const overlayText = document.getElementById("overlay-text");
  const startBtn = document.getElementById("start-btn");
  const pauseBtn = document.getElementById("pause-btn");

  const GRID = 21;                 // cells per side
  const CELL = canvas.width / GRID;
  const BASE_SPEED = 150;          // ms per step at start
  const MIN_SPEED = 70;            // fastest step interval

  // In-memory best score (sandbox may forbid storage).
  let best = 0;

  let snake, dir, nextDir, food, score, speed;
  let state = "idle";              // idle | running | paused | over
  let lastStep = 0;
  let rafId = null;

  function reset() {
    const mid = Math.floor(GRID / 2);
    snake = [
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid },
      { x: mid - 3, y: mid },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = BASE_SPEED;
    placeFood();
    updateScore();
  }

  function placeFood() {
    const free = [];
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        if (!snake.some((s) => s.x === x && s.y === y)) free.push({ x, y });
      }
    }
    // Deterministic-safe: if board full, player has effectively won.
    food = free.length ? free[Math.floor(Math.random() * free.length)] : null;
  }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
  }

  function setDirection(nx, ny) {
    // Prevent reversing directly into the neck.
    if (nx === -dir.x && ny === -dir.y) return;
    nextDir = { x: nx, y: ny };
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision.
    if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID) return gameOver();
    // Self collision (ignore the tail cell that will move away).
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) return gameOver();
    }

    snake.unshift(head);

    if (food && head.x === food.x && head.y === food.y) {
      score += 1;
      updateScore();
      speed = Math.max(MIN_SPEED, BASE_SPEED - score * 4);
      placeFood();
      if (!food) return winGame();
    } else {
      snake.pop();
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function draw() {
    // Checkerboard background.
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        ctx.fillStyle = (x + y) % 2 === 0 ? "#131925" : "#10151f";
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
      }
    }

    // Food with a soft glow.
    if (food) {
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.save();
      ctx.shadowColor = "#f87171";
      ctx.shadowBlur = 14;
      ctx.fillStyle = "#f87171";
      ctx.beginPath();
      ctx.arc(fx, fy, CELL * 0.32, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Snake body.
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const pad = 1.5;
      const t = i / Math.max(1, snake.length - 1);
      if (i === 0) {
        ctx.fillStyle = "#86efac";
      } else {
        // Gentle gradient from head-green to a deeper green at the tail.
        const g = Math.round(222 - t * 70);
        ctx.fillStyle = `rgb(74, ${g}, 128)`;
      }
      roundRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 5);
      ctx.fill();
    }

    // Eyes on the head for a touch of character.
    if (snake.length) {
      const h = snake[0];
      const cx = h.x * CELL + CELL / 2;
      const cy = h.y * CELL + CELL / 2;
      const off = CELL * 0.18;
      ctx.fillStyle = "#0e1117";
      ctx.beginPath();
      ctx.arc(cx + dir.x * off - dir.y * off, cy + dir.y * off - dir.x * off, CELL * 0.09, 0, Math.PI * 2);
      ctx.arc(cx + dir.x * off + dir.y * off, cy + dir.y * off + dir.x * off, CELL * 0.09, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function loop(ts) {
    rafId = requestAnimationFrame(loop);
    if (state !== "running") return;
    if (ts - lastStep >= speed) {
      lastStep = ts;
      step();
      if (state === "running") draw();
    }
  }

  function startGame() {
    reset();
    state = "running";
    lastStep = 0;
    hideOverlay();
    if (!rafId) rafId = requestAnimationFrame(loop);
    draw();
  }

  function togglePause() {
    if (state === "running") {
      state = "paused";
      showOverlay("Paused", "Take a breath. Press Space or the button to resume.", "Resume");
    } else if (state === "paused") {
      state = "running";
      lastStep = performance.now();
      hideOverlay();
    }
  }

  function gameOver() {
    state = "over";
    draw();
    showOverlay("Game Over", `You scored ${score}. ${score >= best ? "That's a new best!" : "Best so far: " + best + "."}`, "Play Again");
  }

  function winGame() {
    state = "over";
    draw();
    showOverlay("You Win! 🏆", "You filled the entire board. Legendary.", "Play Again");
  }

  function showOverlay(title, text, btn) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = btn;
    overlay.classList.remove("hidden");
  }

  function hideOverlay() { overlay.classList.add("hidden"); }

  // --- Input ---
  const KEYMAP = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
    W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0],
  };

  window.addEventListener("keydown", (e) => {
    if (e.key === " " || e.code === "Space") {
      e.preventDefault();
      if (state === "running" || state === "paused") togglePause();
      else startGame();
      return;
    }
    if (KEYMAP[e.key]) {
      e.preventDefault();
      if (state === "running") setDirection(...KEYMAP[e.key]);
      else if (state === "idle" || state === "over") startGame();
    }
  });

  startBtn.addEventListener("click", () => {
    if (state === "paused") togglePause();
    else startGame();
  });
  pauseBtn.addEventListener("click", () => {
    if (state === "idle" || state === "over") startGame();
    else togglePause();
  });

  // Touch / swipe controls.
  let touchStart = null;
  canvas.addEventListener("touchstart", (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });

  canvas.addEventListener("touchend", (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return; // treat as tap
    if (state !== "running") { startGame(); return; }
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
    else setDirection(0, dy > 0 ? 1 : -1);
  }, { passive: true });

  // Initial paint.
  reset();
  draw();
  rafId = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
